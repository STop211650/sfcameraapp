name: SFSpeedAlert
options:
  bundleIdPrefix: com.sfspeedalert
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  SFSpeedAlert:
    type: application
    platform: iOS
    sources:
      - SFSpeedAlert
    info:
      path: SFSpeedAlert/App/Info.plist
      properties:
        CFBundleDisplayName: SF Speed Alert
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
    settings:
      base:
        INFOPLIST_FILE: SFSpeedAlert/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sfspeedalert.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SFSpeedAlert/SFSpeedAlert.entitlements
